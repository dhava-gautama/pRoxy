[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    # importlib import mode + pythonpath keep the top-level `api` package from
    # being shadowed by the tests/api directory (pytest's default prepend mode).
    --import-mode=importlib
    --cov=api
    --cov=state
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # ~63% overall. Remaining gaps: auth_test (~9%), stress (~34%), collections,
    # flows, dns, analytics, threat_detection, content_processing. Raise toward 70
    # as those gain coverage.
    --cov-fail-under=60
asyncio_mode = auto
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    security: marks tests as security-focused
    api: marks tests as API tests
    proxy: marks tests as proxy functionality tests
    rules: marks tests as rule validation tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning