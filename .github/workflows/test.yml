name: pRoxy Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # mitmproxy 12.x requires Python >= 3.12 (quoted so 3.12 isn't parsed as a float)
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run fast tests
      run: python run_tests.py --type fast --parallel 2

    - name: Run security tests
      run: python run_tests.py --type security

    - name: Run full test suite with coverage
      run: python run_tests.py --type all --coverage --parallel 2

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit

    - name: Run Bandit security scanner (report only)
      run: bandit -r api/ state/ proxy/ -f json -o bandit-report.json || true

    - name: Run security-specific tests
      run: python run_tests.py --type security --verbose

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy

    # Formatting checks are advisory (the codebase isn't black-formatted yet).
    - name: Check code formatting with Black (advisory)
      run: black --check --diff api/ state/ proxy/ --line-length=100 || true

    - name: Check import sorting with isort (advisory)
      run: isort --check-only --diff api/ state/ proxy/ --profile black || true

    # Fail only on real errors: syntax errors, undefined names, bad comparisons.
    - name: Lint with flake8 (errors only)
      run: flake8 api/ state/ proxy/ --select=E9,F63,F7,F82 --show-source --statistics

    - name: Type check with mypy (advisory)
      run: mypy api/ state/ --ignore-missing-imports || true

  integration:
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start pRoxy server
      run: |
        PROXY_DISABLE_AUTH=true python main.py > /tmp/proxy.log 2>&1 &
        sleep 12  # dual mitmproxy + dashboard startup

    - name: Test server health
      run: curl -fsS http://localhost:8082/api/settings -o /dev/null || (echo '--- server log ---'; cat /tmp/proxy.log; exit 1)

    - name: Run integration tests
      run: python run_tests.py --type all --markers integration --verbose

    - name: Stop server
      run: pkill -f "python main.py" || true
