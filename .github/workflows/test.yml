name: pRoxy Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run fast tests
      run: |
        python run_tests.py --type fast --parallel 2

    - name: Run security tests
      run: |
        python run_tests.py --type security

    - name: Run full test suite with coverage
      run: |
        python run_tests.py --type all --coverage --parallel 2

    - name: Upload coverage reports to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety

    - name: Run Bandit security scanner
      run: |
        bandit -r api/ state/ pRoxy/ -f json -o bandit-report.json || true

    - name: Run Safety check
      run: |
        safety check --json --output safety-report.json || true

    - name: Run security-specific tests
      run: |
        python run_tests.py --type security --verbose

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy

    - name: Check code formatting with Black
      run: |
        black --check --diff api/ state/ pRoxy/ --line-length=100

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff api/ state/ pRoxy/ --profile black

    - name: Lint with flake8
      run: |
        flake8 api/ state/ pRoxy/ --max-line-length=100 --ignore=E203,W503

    - name: Type check with mypy
      run: |
        mypy api/ state/ --ignore-missing-imports || true

  integration:
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start pRoxy server
      run: |
        python main.py &
        sleep 5  # Give server time to start

    - name: Test server health
      run: |
        curl -f http://localhost:8081/api/settings || exit 1

    - name: Run integration tests
      run: |
        python run_tests.py --markers "integration" --verbose

    - name: Stop server
      run: |
        pkill -f "python main.py" || true